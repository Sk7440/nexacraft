<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .main-box {
        width: 300px;
        height: 300px;
        border: 2px solid;
        perspective: 1000px;
        position: relative;
      }
      .front {
        width: 100%;
        height: 100%;
        border: 2px solid;
        background-color: red;
        position: absolute;
        top: 0;
        left: 0;
        backface-visibility: hidden;
      }

      .back {
        width: 100%;
        height: 100%;
        border: 2px solid;
        background-color: blue;
        position: absolute;
        top: 0;
        left: 0;
        transform: rotateY(-180deg);
    }
    
    .box{
        width: 100%;
        height: 100%;
        transition: 0.3s;
        transform-style: preserve-3d;
      }

      .main-box:hover .box {
        transform: rotateY(180deg);
      }
    </style>
  </head>
  <body>
    <div class="main-box">
      <div class="box">
        <div class="back">
          <h1>back</h1>
        </div>
        <div class="front">
          <h1>front</h1>
        </div>
      </div>
    </div>
  </body>
</html>
